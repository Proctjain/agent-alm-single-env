# =====================================================================
# PROMOTE DEV AGENT -> PROD AGENT  (single environment)
# Manual trigger, gated by the "production" GitHub Environment.
# Backs up prod, exports dev, rewrites dev identity -> prod identity,
# safety-checks, imports onto the prod agent, publishes it.
#
#  >>> EDIT LINES 17, 21, 25, 29, 33  <<<
# =====================================================================
name: Promote dev agent to prod agent

on:
  workflow_dispatch:
    inputs:
      dev_solution:
        description: "Dev solution unique Name"
        required: true
        default: AgentDev                      # <<< EDIT 1: DEV solution Name
      prod_solution:
        description: "Prod solution unique Name"
        required: true
        default: AgentProd                     # <<< EDIT 2: PROD solution Name
      dev_stem:
        description: "Dev agent schema name"
        required: true
        default: con_ContosoAssistantDEV       # <<< EDIT 3: DEV agent schema name
      prod_stem:
        description: "Prod agent schema name"
        required: true
        default: con_ContosoAssistant          # <<< EDIT 4: PROD agent schema name
      prod_bot_id:
        description: "Prod agent Bot ID (GUID)"
        required: true
        default: 33062c04-0384-f111-ab0f-7ced8daf5448   # <<< EDIT 5: PROD agent Bot ID

permissions:
  contents: write

jobs:
  promote:
    runs-on: windows-latest
    environment: production          # pauses here for your approval
    env:
      DEV_SOLUTION: ${{ github.event.inputs.dev_solution }}
      PROD_SOLUTION: ${{ github.event.inputs.prod_solution }}
      DEV_STEM: ${{ github.event.inputs.dev_stem }}
      PROD_STEM: ${{ github.event.inputs.prod_stem }}
      PROD_BOT_ID: ${{ github.event.inputs.prod_bot_id }}
      MAP_FILE: identity-map-${{ github.event.inputs.prod_solution }}.json
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Verify required secrets are present
        shell: pwsh
        env:
          S_ENV: ${{ secrets.PP_ENV_URL }}
          S_CID: ${{ secrets.PP_CLIENT_ID }}
          S_SEC: ${{ secrets.PP_CLIENT_SECRET }}
          S_TID: ${{ secrets.PP_TENANT_ID }}
        run: |
          $missing = @()
          if (-not $env:S_ENV) { $missing += 'PP_ENV_URL' }
          if (-not $env:S_CID) { $missing += 'PP_CLIENT_ID' }
          if (-not $env:S_SEC) { $missing += 'PP_CLIENT_SECRET' }
          if (-not $env:S_TID) { $missing += 'PP_TENANT_ID' }
          if ($missing) {
            Write-Error ("Missing REPOSITORY secrets: " + ($missing -join ', ') +
              ". Add them at Settings > Secrets and variables > Actions > Repository secrets (not Variables, not Environment secrets).")
          }
          if ($env:S_ENV -notmatch '^https://') { Write-Error "PP_ENV_URL must start with https://" }
          echo "All four secrets present."

      - name: Export dev solution (source of truth)
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ secrets.PP_ENV_URL }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-name: ${{ env.DEV_SOLUTION }}
          managed: false
          solution-output-file: out/dev.zip

      - name: Export prod solution (backup + mapping source)
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ secrets.PP_ENV_URL }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-name: ${{ env.PROD_SOLUTION }}
          managed: false
          solution-output-file: out/prod_backup.zip

      - name: Save prod backup artifact (rollback point)
        uses: actions/upload-artifact@v4
        with:
          name: prod-backup-run-${{ github.run_number }}
          path: out/prod_backup.zip

      - name: Unpack dev
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: out/dev.zip
          solution-folder: work/dev
          solution-type: Unmanaged
          overwrite-files: true

      - name: Unpack prod
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: out/prod_backup.zip
          solution-folder: work/prod
          solution-type: Unmanaged
          overwrite-files: true

      - name: Transform dev identity onto prod identity
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $guidRx = '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
          $binExt = @('.png','.jpg','.jpeg','.gif','.bmp','.ico','.webp','.tif','.tiff',
                      '.zip','.dll','.exe','.pdf','.msapp','.gz','.7z')
          $utf8 = New-Object System.Text.UTF8Encoding($false)

          function IsTextFile($file) {
            if ($binExt -contains $file.Extension.ToLower()) { return $false }
            try {
              $fs = [System.IO.File]::OpenRead($file.FullName)
              $buf = New-Object byte[] 4096
              $n = $fs.Read($buf, 0, 4096); $fs.Close()
              for ($j = 0; $j -lt $n; $j++) { if ($buf[$j] -eq 0) { return $false } }
              return $true
            } catch { return $false }
          }

          if ($env:DEV_STEM -eq $env:PROD_STEM) {
            Write-Error ("ABORT: DEV_STEM and PROD_STEM are both '" + $env:DEV_STEM + "' (lines 25 and 29).")
          }
          if ($env:DEV_SOLUTION -eq $env:PROD_SOLUTION) {
            Write-Error "ABORT: DEV_SOLUTION and PROD_SOLUTION are identical (lines 17 and 21)."
          }

          function Report($label, $root) {
            Write-Host "===== $label ====="
            if (-not (Test-Path $root)) { Write-Host "  (folder missing entirely)"; return }
            $files = @(Get-ChildItem $root -Recurse -File -ErrorAction SilentlyContinue)
            Write-Host ("  total files: {0}" -f $files.Count)
            foreach ($d in @('bots','botcomponents')) {
              $p = Join-Path $root $d
              if (Test-Path $p) {
                $subs = @(Get-ChildItem $p -Directory)
                Write-Host ("  {0}/ : {1} subfolders" -f $d, $subs.Count)
              } else {
                Write-Host ("  {0}/ : NOT PRESENT  <-- no agent in this solution" -f $d)
              }
            }
          }
          Write-Host "############ STRUCTURE REPORT ############"
          Report "work/dev  (solution $env:DEV_SOLUTION)"  'work/dev'
          Report "work/prod (solution $env:PROD_SOLUTION)" 'work/prod'
          Write-Host ""

          # ---- collect every distinct GUID under a folder, in stable file order ----
          function GuidsIn($dir) {
            $list = New-Object System.Collections.Generic.List[string]
            if (-not (Test-Path $dir)) { return $list }
            foreach ($f in @(Get-ChildItem $dir -Recurse -File -ErrorAction SilentlyContinue | Sort-Object FullName)) {
              if (-not (IsTextFile $f)) { continue }
              $c = [System.IO.File]::ReadAllText($f.FullName)
              foreach ($m in [regex]::Matches($c, $guidRx)) {
                $v = $m.Value.ToLower()
                if (-not $list.Contains($v)) { [void]$list.Add($v) }
              }
            }
            return $list
          }

          # ---- load persistent map, then extend it by folder correspondence ----
          $map = @{}
          if (Test-Path $env:MAP_FILE) {
            (Get-Content $env:MAP_FILE -Raw | ConvertFrom-Json).psobject.Properties |
              ForEach-Object { $map[$_.Name] = $_.Value }
          }

          $pairs = 0
          foreach ($area in @('bots','botcomponents','Other')) {
            $devBase  = Join-Path 'work/dev'  $area
            $prodBase = Join-Path 'work/prod' $area
            if (-not (Test-Path $devBase)) { continue }

            $units = @()
            if ($area -eq 'Other') {
              $units = @([pscustomobject]@{ Dev = $devBase; Prod = $prodBase; Name = 'Other' })
            } else {
              foreach ($dir in @(Get-ChildItem $devBase -Directory)) {
                $prodName = $dir.Name.Replace($env:DEV_STEM, $env:PROD_STEM)
                $units += [pscustomobject]@{
                  Dev  = $dir.FullName
                  Prod = (Join-Path $prodBase $prodName)
                  Name = $dir.Name
                }
              }
            }

            foreach ($u in $units) {
              $devG  = GuidsIn $u.Dev
              $prodG = GuidsIn $u.Prod
              for ($k = 0; $k -lt $devG.Count; $k++) {
                $d = $devG[$k]
                if ($map.ContainsKey($d)) { continue }
                if ($k -lt $prodG.Count) { $map[$d] = $prodG[$k] }
                else { $map[$d] = [guid]::NewGuid().ToString().ToLower() }
                $pairs++
              }
            }
          }
          Write-Host ("Identity map: {0} total entries ({1} new this run)." -f $map.Count, $pairs)
          if ($map.Count -eq 0) {
            Write-Error "ABORT: identity map is empty - no GUIDs found under work/dev. Paste the structure report above."
          }
          $map | ConvertTo-Json | Set-Content $env:MAP_FILE

          # ---- order-independent two-phase replacement ----
          $ph = @{}
          $i = 0
          foreach ($k in @($map.Keys)) { $ph[$k] = ("@@GUID" + $i + "@@"); $i++ }

          Remove-Item stage -Recurse -Force -ErrorAction SilentlyContinue
          $devRoot = (Resolve-Path 'work/dev').Path
          foreach ($f in @(Get-ChildItem work/dev -Recurse -File)) {
            $rel = $f.FullName.Substring($devRoot.Length + 1).Replace($env:DEV_STEM, $env:PROD_STEM)
            $t = Join-Path 'stage' $rel
            New-Item -ItemType Directory -Force -Path (Split-Path $t) | Out-Null
            if (IsTextFile $f) {
              $c = [System.IO.File]::ReadAllText($f.FullName)
              foreach ($k in @($ph.Keys)) { $c = $c -ireplace [regex]::Escape($k), $ph[$k] }
              $c = $c.Replace($env:DEV_STEM, $env:PROD_STEM)
              $c = $c.Replace($env:DEV_SOLUTION, $env:PROD_SOLUTION)
              foreach ($k in @($ph.Keys)) { $c = $c.Replace($ph[$k], $map[$k]) }
              [System.IO.File]::WriteAllText($t, $c, $utf8)
            } else {
              Copy-Item $f.FullName $t -Force
            }
          }

          # ---- safety gate over every text file ----
          $textFiles = @(Get-ChildItem stage -Recurse -File | Where-Object { IsTextFile $_ })
          Write-Host ("Safety gate scanning {0} text files." -f $textFiles.Count)
          $problems = @()
          $pathLeak = @(Get-ChildItem stage -Recurse | Where-Object { $_.FullName -match [regex]::Escape($env:DEV_STEM) })
          foreach ($pl in $pathLeak) { $problems += ("PATH still has dev stem: " + $pl.FullName) }
          foreach ($f in $textFiles) {
            $c = [System.IO.File]::ReadAllText($f.FullName)
            if ($c -match [regex]::Escape($env:DEV_STEM)) { $problems += ("STEM leak in: " + $f.FullName) }
            foreach ($k in @($map.Keys)) {
              if ($c -imatch [regex]::Escape($k)) { $problems += ("GUID " + $k + " leaked in: " + $f.FullName) }
            }
          }
          if ($problems.Count -gt 0) {
            Write-Host "############ LEAK DETAIL ############"
            $problems | Select-Object -First 40 | ForEach-Object { Write-Host ("  " + $_) }
            Write-Error ("ABORT: dev identity leaked in {0} place(s) - see detail above." -f $problems.Count)
          }
          echo "Transform clean."

      - name: Pack transformed solution
        uses: microsoft/powerplatform-actions/pack-solution@v1
        with:
          solution-folder: stage
          solution-file: out/promote.zip
          solution-type: Unmanaged

      - name: Import onto prod agent
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ secrets.PP_ENV_URL }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-file: out/promote.zip
          force-overwrite: true
          publish-changes: true

      - name: Publish prod agent to its channels
        continue-on-error: true      # import already succeeded; publish is the channel push
        shell: pwsh
        env:
          S_ENV: ${{ secrets.PP_ENV_URL }}
          S_CID: ${{ secrets.PP_CLIENT_ID }}
          S_SEC: ${{ secrets.PP_CLIENT_SECRET }}
          S_TID: ${{ secrets.PP_TENANT_ID }}
        run: |
          $ErrorActionPreference = 'Continue'
          $envUrl = $env:S_ENV.TrimEnd('/')

          $pac = $env:POWERPLATFORMTOOLS_PACPATH
          if (-not $pac -or -not (Test-Path $pac)) {
            $pac = (Get-ChildItem -Path $env:RUNNER_TEMP,$env:TEMP -Filter pac.exe -Recurse -ErrorAction SilentlyContinue |
                    Select-Object -First 1).FullName
          }
          if (-not $pac) { Write-Host "Could not locate pac.exe."; exit 1 }

          & $pac auth create --applicationId $env:S_CID --clientSecret $env:S_SEC `
                             --tenant $env:S_TID --environment $envUrl | Out-Null

          # pac argument shapes vary by build - try the documented forms in order.
          $attempts = @(
            @('copilot','publish','--bot', $env:PROD_BOT_ID),
            @('copilot','publish','-id',   $env:PROD_BOT_ID),
            @('copilot','publish','--bot', $env:PROD_STEM),
            @('copilot','publish','--environment', $envUrl, '--bot', $env:PROD_STEM)
          )

          $ok = $false
          foreach ($a in $attempts) {
            Write-Host ""
            Write-Host ("---- trying: pac " + ($a -join ' ')) 
            & $pac @a
            if ($LASTEXITCODE -eq 0) { $ok = $true; Write-Host "PUBLISH SUCCEEDED."; break }
            Write-Host ("   failed with exit code " + $LASTEXITCODE)
          }

          if (-not $ok) {
            Write-Host ""
            Write-Host "######################################################################"
            Write-Host "# PUBLISH DID NOT COMPLETE - but the IMPORT SUCCEEDED.               #"
            Write-Host "# Your prod agent already has the promoted content in its draft.     #"
            Write-Host "# Finish by opening the PROD agent in Copilot Studio and clicking    #"
            Write-Host "# Publish. Everything else in this pipeline is done.                 #"
            Write-Host "######################################################################"
            $logPath = Join-Path (Split-Path $pac) 'logs\pac-log.txt'
            if (Test-Path $logPath) {
              Write-Host ""
              Write-Host "---- last 40 lines of pac-log.txt ----"
              Get-Content $logPath -Tail 40
            }
          }

      - name: Commit updated identity map
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add $env:MAP_FILE
          if (git status --porcelain) {
            git commit -m "Update identity map (run $env:GITHUB_RUN_NUMBER)"
            git push
          }
