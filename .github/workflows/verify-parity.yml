# =====================================================================
# VERIFY DEV / PROD AGENT PARITY  --  drift detector (read-only)
# Exports both agents, neutralises the legitimate identity differences
# (schema names + GUIDs), then compares. Fails the run on drift.
#
# A RED RUN IS NOT A BROKEN SCRIPT - it means prod does not match dev.
#
#  >>> EDIT LINES 18, 22, 26, 30  <<<
# =====================================================================
name: Verify dev-prod agent parity

on:
  workflow_dispatch:
    inputs:
      dev_solution:
        description: "Dev solution Name"
        required: true
        default: AgentDev                      # <<< EDIT 1: DEV solution Name
      prod_solution:
        description: "Prod solution Name"
        required: true
        default: AgentProd                     # <<< EDIT 2: PROD solution Name
      dev_stem:
        description: "Dev agent schema name"
        required: true
        default: con_ContosoAssistantDEV       # <<< EDIT 3: DEV agent schema name
      prod_stem:
        description: "Prod agent schema name"
        required: true
        default: con_ContosoAssistant          # <<< EDIT 4: PROD agent schema name

jobs:
  verify:
    runs-on: windows-latest
    env:
      DEV_SOLUTION: ${{ github.event.inputs.dev_solution }}
      PROD_SOLUTION: ${{ github.event.inputs.prod_solution }}
      DEV_STEM: ${{ github.event.inputs.dev_stem }}
      PROD_STEM: ${{ github.event.inputs.prod_stem }}
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Export dev
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ secrets.PP_ENV_URL }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-name: ${{ env.DEV_SOLUTION }}
          managed: false
          solution-output-file: out/dev.zip

      - name: Export prod
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ secrets.PP_ENV_URL }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-name: ${{ env.PROD_SOLUTION }}
          managed: false
          solution-output-file: out/prod.zip

      - name: Unpack dev
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: out/dev.zip
          solution-folder: work/dev
          solution-type: Unmanaged
          overwrite-files: true

      - name: Unpack prod
        uses: microsoft/powerplatform-actions/unpack-solution@v1
        with:
          solution-file: out/prod.zip
          solution-folder: work/prod
          solution-type: Unmanaged
          overwrite-files: true

      - name: Normalize identities and compare
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $guidRx = '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}'
          $binExt = @('.png','.jpg','.jpeg','.gif','.bmp','.ico','.webp','.tif','.tiff',
                      '.zip','.dll','.exe','.pdf','.msapp','.gz','.7z')
          $utf8 = New-Object System.Text.UTF8Encoding($false)

          function IsTextFile($file) {
            if ($binExt -contains $file.Extension.ToLower()) { return $false }
            try {
              $fs = [System.IO.File]::OpenRead($file.FullName)
              $buf = New-Object byte[] 4096
              $n = $fs.Read($buf, 0, 4096); $fs.Close()
              for ($j = 0; $j -lt $n; $j++) { if ($buf[$j] -eq 0) { return $false } }
              return $true
            } catch { return $false }
          }

          # Build a dictionary of relative-path -> normalized content.
          # 'Other/' is skipped: solution metadata legitimately differs.
          function Snapshot($root, $stem) {
            $out = @{}
            foreach ($area in @('bots','botcomponents')) {
              $base = Join-Path $root $area
              if (-not (Test-Path $base)) { continue }
              $basePath = (Resolve-Path $base).Path
              foreach ($f in @(Get-ChildItem $base -Recurse -File)) {
                if (-not (IsTextFile $f)) { continue }
                $rel = $area + '/' + $f.FullName.Substring($basePath.Length + 1)
                $rel = $rel.Replace($stem, 'AGENT').Replace('\', '/')
                $c = [System.IO.File]::ReadAllText($f.FullName)
                $c = $c.Replace($stem, 'AGENT')
                $c = [regex]::Replace($c, $guidRx, 'GUID')
                $c = $c -replace "`r`n", "`n"
                $out[$rel] = $c.Trim()
              }
            }
            return $out
          }

          $dev  = Snapshot 'work/dev'  $env:DEV_STEM
          $prod = Snapshot 'work/prod' $env:PROD_STEM
          Write-Host ("Compared {0} dev files against {1} prod files." -f $dev.Count, $prod.Count)
          Write-Host ""

          $onlyDev  = @($dev.Keys  | Where-Object { -not $prod.ContainsKey($_) } | Sort-Object)
          $onlyProd = @($prod.Keys | Where-Object { -not $dev.ContainsKey($_)  } | Sort-Object)
          $differs  = @($dev.Keys  | Where-Object { $prod.ContainsKey($_) -and $prod[$_] -ne $dev[$_] } | Sort-Object)

          if ($onlyDev.Count -gt 0) {
            Write-Host "---- IN DEV BUT NOT IN PROD (promotion has not created these yet) ----"
            $onlyDev | ForEach-Object { Write-Host ("  + " + $_) }
            Write-Host ""
          }
          if ($onlyProd.Count -gt 0) {
            Write-Host "---- IN PROD BUT NOT IN DEV (deleted in dev; unmanaged import never removes) ----"
            $onlyProd | ForEach-Object { Write-Host ("  - " + $_) }
            Write-Host ""
          }
          if ($differs.Count -gt 0) {
            Write-Host "---- CONTENT DIFFERS ----"
            foreach ($k in $differs) {
              Write-Host ("  ~ " + $k)
              $dl = $dev[$k]  -split "`n"
              $pl = $prod[$k] -split "`n"
              $shown = 0
              for ($i = 0; $i -lt [Math]::Max($dl.Count, $pl.Count); $i++) {
                $a = if ($i -lt $dl.Count) { $dl[$i] } else { '' }
                $b = if ($i -lt $pl.Count) { $pl[$i] } else { '' }
                if ($a -ne $b) {
                  Write-Host ("      line {0}" -f ($i + 1))
                  Write-Host ("        dev : " + $a.Trim())
                  Write-Host ("        prod: " + $b.Trim())
                  $shown++
                  if ($shown -ge 4) { Write-Host "        ... (more differences in this file)"; break }
                }
              }
            }
            Write-Host ""
          }

          $total = $onlyDev.Count + $onlyProd.Count + $differs.Count
          if ($total -eq 0) {
            Write-Host "########################################"
            Write-Host "#  PARITY OK - prod matches dev.       #"
            Write-Host "########################################"
          } else {
            Write-Host ("Summary: {0} only-in-dev, {1} only-in-prod, {2} differing." -f $onlyDev.Count, $onlyProd.Count, $differs.Count)
            Write-Error "DRIFT: prod agent does not match dev agent. See detail above."
          }
