# =====================================================================
# DISCOVER ENVIRONMENT VALUES  --  run this once, read the log
# Prints every solution's UNIQUE NAME and every agent's Bot ID,
# so you can fill in the EDIT lines of the other workflows.
# Read-only: nothing in the environment is changed. No edits needed.
# =====================================================================
name: Discover solutions and agents

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: windows-latest
    steps:
      - uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Authenticate and list
        shell: pwsh
        env:
          S_ENV: ${{ secrets.PP_ENV_URL }}
          S_CID: ${{ secrets.PP_CLIENT_ID }}
          S_SEC: ${{ secrets.PP_CLIENT_SECRET }}
          S_TID: ${{ secrets.PP_TENANT_ID }}
        run: |
          # actions-install does NOT put pac on PATH; it exports this variable.
          $pac = $env:POWERPLATFORMTOOLS_PACPATH
          if (-not $pac -or -not (Test-Path $pac)) {
            $pac = (Get-ChildItem -Path $env:RUNNER_TEMP,$env:TEMP -Filter pac.exe -Recurse -ErrorAction SilentlyContinue |
                    Select-Object -First 1).FullName
          }
          if (-not $pac) { Write-Error "Could not locate pac.exe on the runner." }
          Write-Host "Using pac at: $pac"

          & $pac auth create --applicationId $env:S_CID --clientSecret $env:S_SEC `
                             --tenant $env:S_TID --environment $env:S_ENV

          Write-Host ""
          Write-Host "================ SOLUTIONS ================"
          Write-Host "Use the UNIQUE NAME column for EDIT 1 / EDIT 2."
          Write-Host ""
          & $pac solution list

          Write-Host ""
          Write-Host "================ AGENTS ================"
          Write-Host "Use the Bot ID of your PROD agent for EDIT 5."
          Write-Host ""
          # Non-fatal: if this command group differs in your pac version,
          # the solutions list above is still what you need.
          try { & $pac copilot list } catch { Write-Host "copilot list unavailable: $_" }
